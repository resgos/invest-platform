{% extends "base.html" %}
{% block title %}Ошибка {{ code }} — Группа Титан{% endblock %}
{% block content %}
<section class="auth-section">
  <div class="auth-card glass-card text-center">
    <div class="auth-icon" style="background: linear-gradient(135deg, #ef4444, #dc2626)"><i class="fas fa-exclamation-triangle"></i></div>
    <h2 style="color:#fff; font-weight:700; font-size:3rem" class="mb-2">{{ code }}</h2>
    <p class="text-muted-light mb-4">{{ message }}</p>
    <a href="{{ url_for('index') }}" class="btn btn-accent"><i class="fas fa-home me-2"></i>На главную</a>
  </div>
</section>
{% endblock %}
