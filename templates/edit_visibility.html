{% extends "base.html" %}
{% block title %}Видимость — {{ ad.title }} — InvestPlatform{% endblock %}
{% block content %}
<section class="dashboard-section">
  <div class="container" style="max-width:700px">
    <nav class="mb-4"><a href="{{ url_for('admin_dashboard') }}" class="accent-link"><i class="fas fa-arrow-left me-1"></i>К панели администратора</a></nav>
    <div class="glass-card">
      <h3 style="color:#fff" class="mb-2"><i class="fas fa-eye me-2"></i>Настройка видимости</h3>
      <p class="text-muted-light mb-4">{{ ad.title }}</p>
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-4">
          <label class="form-label">Видимость</label>
          <select name="visibility" class="form-select" id="visibilitySelect">
            <option value="selected" {% if ad.visibility=='selected' %}selected{% endif %}>Только выбранным</option>
            <option value="all" {% if ad.visibility=='all' %}selected{% endif %}>Всем инвесторам</option>
          </select>
        </div>
        <div id="investorSelector" style="display:none">
          <label class="form-label">Инвесторы с доступом</label>
          <div class="investor-select-wrapper"><div class="investor-checkboxes">
            {% for inv in investors %}
            <label class="investor-checkbox-item">
              <input type="checkbox" name="selected_investors" value="{{ inv.id }}" {% if inv.id in assigned_ids %}checked{% endif %}>
              <div class="investor-info"><span class="investor-name">{{ inv.full_name }}</span><span class="investor-email">{{ inv.email }}</span></div>
            </label>
            {% endfor %}
          </div></div>
        </div>
        <button type="submit" class="btn btn-accent mt-4"><i class="fas fa-save me-2"></i>Сохранить</button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const vis = document.getElementById('visibilitySelect');
    function toggle() { document.getElementById('investorSelector').style.display = vis.value === 'selected' ? '' : 'none'; }
    vis.addEventListener('change', toggle);
    toggle();
});
</script>
{% endblock %}
