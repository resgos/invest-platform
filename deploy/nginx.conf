# /etc/nginx/sites-available/gruppa-titan
# Reverse-proxy к gunicorn (127.0.0.1:5000) + раздача static и uploads напрямую.
# Когда появится домен — добавить SSL через certbot:
#   sudo certbot --nginx -d gruppa-titan.ru -d www.gruppa-titan.ru

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Файлы с фото / документами сделок (приватные — но прямой URL без авторизации
    # отдавать не хотим: проксируем через Flask, который проверит видимость).
    location /uploads/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Публичная статика — раздаём напрямую, минуя Python
    location /static/ {
        alias /home/deploy/gruppa-titan/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Лимит на загрузку (10 МБ — синхронно с Flask MAX_CONTENT_LENGTH)
    client_max_body_size 12m;

    # Базовая защита
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Прокси на gunicorn
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Чтобы лимитер видел реальный IP клиента
        proxy_set_header X-Real-IP $remote_addr;
    }
}
